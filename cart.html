<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shopping Cart | Alfa Grocery Mart</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    .cart-container {
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 40px;
      margin: 40px auto 80px;
    }

    .cart-items {
      background: var(--white);
      border-radius: 10px;
      box-shadow: var(--shadow);
      padding: 30px;
    }

    .cart-item {
      display: flex;
      align-items: center;
      gap: 20px;
      padding: 20px 0;
      border-bottom: 1px solid var(--border-color);
    }
    
    .cart-item:last-child {
      border-bottom: none;
    }

    .cart-img {
      width: 100px;
      height: 100px;
      object-fit: cover;
      border-radius: 8px;
    }

    .cart-details {
      flex: 1;
    }

    .cart-title {
      font-size: 1.2rem;
      color: var(--text-dark);
      margin-bottom: 5px;
    }
    
    .cart-price {
      color: var(--primary-color);
      font-weight: 600;
    }

    .cart-remove {
      color: #e74c3c;
      background: none;
      border: none;
      font-size: 1.2rem;
      cursor: pointer;
      transition: var(--transition);
      padding: 10px;
    }
    .cart-remove:hover {
      color: #c0392b;
    }

    .order-summary {
      background: var(--white);
      border-radius: 10px;
      box-shadow: var(--shadow);
      padding: 30px;
      height: fit-content;
      position: sticky;
      top: 100px;
    }

    .summary-row {
      display: flex;
      justify-content: space-between;
      margin-bottom: 15px;
      color: var(--text-dark);
    }

    .summary-total {
      border-top: 1px solid var(--border-color);
      padding-top: 15px;
      margin-top: 15px;
      font-size: 1.2rem;
      font-weight: 700;
    }

    .empty-cart {
      text-align: center;
      padding: 50px 20px;
    }
    .empty-cart i {
      font-size: 4rem;
      color: #ccc;
      margin-bottom: 20px;
    }

    @media (max-width: 768px) {
      .cart-container {
        grid-template-columns: 1fr;
      }
      .cart-item {
        flex-direction: column;
        text-align: center;
      }
    }
  </style>
</head>
<body>

  <!-- Loader -->
  <div id="loader">
    <div class="spinner"></div>
  </div>

  <!-- Header -->
  <header class="header">
    <div class="container navbar">
      <a href="index.html" class="logo">
        <i class="fas fa-shopping-basket"></i> Alfa Mart
      </a>
      
      <nav class="nav-links">
        <a href="index.html">Home</a>
        <a href="products.html">Products</a>
        <a href="about.html">About Us</a>
        <a href="contact.html">Contact</a>
      </nav>

      <div class="nav-icons">
        <a href="products.html" class="icon-btn">
          <i class="fas fa-search"></i>
        </a>
        <a href="login.html" class="icon-btn">
          <i class="fas fa-user"></i>
        </a>
        <a href="cart.html" class="icon-btn" style="color: var(--primary-color);">
          <i class="fas fa-shopping-cart"></i>
          <span class="cart-count" id="cartCount">0</span>
        </a>
        <div class="mobile-menu-btn">
          <i class="fas fa-bars"></i>
        </div>
      </div>
    </div>
  </header>

  <div class="container">
    <h2 class="section-title" style="margin-top: 40px; text-align: left; margin-bottom: 0;">Shopping Cart</h2>
  </div>

  <section class="container cart-container" id="cartLayout">
    <!-- Populated by JS -->
  </section>

  <!-- Footer -->
  <footer class="footer">
    <div class="container">
      <div class="footer-bottom">
        <p>&copy; Demo alfa mart website created by AKR.</p>
      </div>
    </div>
  </footer>

  <script src="script.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      // Create a global function so script.js can call it when qty changes
      window.renderCart = function() {
        const cartLayout = document.getElementById('cartLayout');
        
        if (cart.length === 0) {
          cartLayout.style.gridTemplateColumns = '1fr';
          cartLayout.innerHTML = `
            <div class="cart-items empty-cart">
              <i class="fas fa-shopping-basket"></i>
              <h2>Your cart is empty</h2>
              <p style="margin: 15px 0;">Looks like you haven't added anything to your cart yet.</p>
              <a href="products.html" class="btn">Start Shopping</a>
            </div>
          `;
          return;
        }

        cartLayout.style.gridTemplateColumns = ''; // Restore default from CSS
        
        let itemsHtml = '<div class="cart-items">';
        let subtotal = 0;
        
        cart.forEach(item => {
          const itemTotal = item.price * item.quantity;
          subtotal += itemTotal;
          
          itemsHtml += `
            <div class="cart-item">
              <img src="${item.image}" alt="${item.name}" class="cart-img">
              <div class="cart-details">
                <h3 class="cart-title">${item.name}</h3>
                <div class="cart-price">${formatPrice(item.price)}</div>
              </div>
              <div class="qty-control">
                <button class="qty-btn" onclick="updateQuantity(${item.id}, ${item.quantity - 1})">-</button>
                <input class="qty-input" type="number" value="${item.quantity}" readonly>
                <button class="qty-btn" onclick="updateQuantity(${item.id}, ${item.quantity + 1})">+</button>
              </div>
              <div style="font-weight: 600; min-width: 80px; text-align:right;">
                ${formatPrice(itemTotal)}
              </div>
              <button class="cart-remove" onclick="removeFromCart(${item.id})">
                <i class="fas fa-trash"></i>
              </button>
            </div>
          `;
        });
        itemsHtml += '</div>';

        const tax = subtotal * 0.05; // 5% tax
        const total = subtotal + tax;

        const summaryHtml = `
          <div class="order-summary">
            <h3 style="margin-bottom: 20px; font-size: 1.3rem;">Order Summary</h3>
            <div class="summary-row">
              <span>Subtotal</span>
              <span>${formatPrice(subtotal)}</span>
            </div>
            <div class="summary-row">
              <span>Estimated Tax (5%)</span>
              <span>${formatPrice(tax)}</span>
            </div>
            <div class="summary-row">
              <span>Shipping</span>
              <span style="color: var(--primary-color);">Free</span>
            </div>
            <div class="summary-row summary-total">
              <span>Total</span>
              <span>${formatPrice(total)}</span>
            </div>
            <a href="checkout.html" class="btn" style="width: 100%; margin-top: 20px; font-size: 1.1rem; padding: 15px;">
              Proceed to Checkout
            </a>
          </div>
        `;

        cartLayout.innerHTML = itemsHtml + summaryHtml;
      };

      // Initial render
      renderCart();
    });
  </script>
</body>
</html>
