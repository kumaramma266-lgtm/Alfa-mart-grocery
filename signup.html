<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up | Alfa Grocery Mart</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    .auth-container {
      max-width: 450px;
      margin: 60px auto;
      background: var(--white);
      padding: 40px;
      border-radius: 10px;
      box-shadow: var(--shadow);
    }
    .auth-header {
      text-align: center;
      margin-bottom: 30px;
    }
    .auth-header i {
      font-size: 3rem;
      color: var(--primary-color);
      margin-bottom: 10px;
    }
    .form-group {
      margin-bottom: 20px;
    }
    .form-group label {
      display: block;
      margin-bottom: 8px;
    }
    .form-control {
      width: 100%;
      padding: 12px;
      border: 1px solid var(--border-color);
      border-radius: 5px;
    }
    .auth-footer {
      text-align: center;
      margin-top: 20px;
      color: var(--text-light);
    }
    .auth-footer a {
      color: var(--primary-color);
      font-weight: 600;
    }
  </style>
</head>
<body style="background-color: var(--primary-light);">

  <div class="auth-container">
    <div class="auth-header">
      <i class="fas fa-user-plus"></i>
      <h2>Create Account</h2>
      <p style="color: var(--text-light);">Join Alfa Mart for fresh deals</p>
    </div>
    
    <form onsubmit="event.preventDefault(); window.location.href='index.html';">
      <div class="form-group">
        <label>Full Name</label>
        <input type="text" class="form-control" required placeholder="Enter full name">
      </div>
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" class="form-control" required placeholder="Enter your email">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" class="form-control" required placeholder="Create a password">
      </div>
      <button type="submit" class="btn" style="width: 100%;">Create Account</button>
    </form>
    
    <div class="auth-footer">
      Already have an account? <a href="login.html">Login</a><br><br>
      <a href="index.html" style="color: var(--text-light); text-decoration: underline;"><i class="fas fa-arrow-left"></i> Back to Store</a>
    </div>
  </div>

</body>
</html>
